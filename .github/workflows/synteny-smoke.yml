name: Synteny Smoke Tests

on:
  pull_request:
    paths:
      - "R/**"
      - "inst/htmlwidgets/**"
      - "tests/testthat/**"
      - "scripts/run-smoke-tests.sh"
      - "DESCRIPTION"
      - "NAMESPACE"
  push:
    branches: [main, master]
    paths:
      - "R/**"
      - "inst/htmlwidgets/**"
      - "tests/testthat/**"
      - "scripts/run-smoke-tests.sh"
      - "DESCRIPTION"
      - "NAMESPACE"

permissions:
  contents: read

jobs:
  synteny-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat
          needs: check

      - name: Run synteny smoke tests
        run: bash scripts/run-smoke-tests.sh
